<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Liquid Artifact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#000; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .vapor-grain { position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.04; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    
    #artifactCanvas { position:absolute; inset:0; z-index:1; width:100%; height:100%; }
    
    .interface-layer { position:relative; z-index:10; pointer-events:none; }
    .artifact-tag { font-family:var(--sans); text-transform:uppercase; letter-spacing:1.5em; font-size:0.5rem; color:var(--brass); margin-bottom:5vh; opacity:0; text-align:center; display:block; }
    
    .status-panel { position:fixed; bottom:8vh; left:50%; transform:translateX(-50%); text-align:center; opacity:0; }
    .status-title { font-family:var(--serif); font-size:clamp(1.5rem, 3vw, 3rem); font-style:italic; font-weight:400; color:var(--sand); margin-bottom:1.5rem; }
    .status-bar { width:200px; height:1px; background:rgba(222,200,181,0.1); margin:0 auto; overflow:hidden; position:relative; }
    .status-fill { position:absolute; inset:0; width:0%; background:var(--brass); }

    .exit-flare { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="vapor-grain"></div>
<div class="exit-flare" id="flare"></div>
<canvas id="artifactCanvas"></canvas>

<div class="interface-layer">
  <span class="artifact-tag" id="aTag">Bespoke Artifact Handover</span>
  <div class="status-panel" id="sPanel">
    <h2 class="status-title">Stabilizing Transition</h2>
    <div class="status-bar"><div class="status-fill" id="sFill"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('artifactCanvas'), ctx = canvas.getContext('2d');
  let w, h, mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  function rs() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();
  window.addEventListener('mousemove', e => { mouse.tx = e.clientX; mouse.ty = e.clientY; });

  // Fluid Ribbon Engine
  let time = 0;
  let stability = 0; // 0 (chaotic) to 1 (solid line)
  
  function drawRibbon() {
    ctx.clearRect(0,0,w,h);
    time += 0.015;
    
    // Smooth mouse
    mouse.x += (mouse.tx - mouse.x) * 0.05;
    mouse.y += (mouse.ty - mouse.y) * 0.05;

    const segments = 120;
    const centerX = w / 2;
    const centerY = h / 2;
    
    ctx.lineCap = 'round';
    ctx.globalCompositeOperation = 'screen';

    // We draw multiple layers to create the "Liquid Mass" look
    for (let layer = 0; layer < 3; layer++) {
      ctx.beginPath();
      ctx.lineWidth = (3 - layer) * 4;
      ctx.strokeStyle = layer === 0 ? 'rgba(196,156,123,0.3)' : (layer === 1 ? 'rgba(222,200,181,0.15)' : 'rgba(255,255,255,0.05)');
      
      for (let i = 0; i < segments; i++) {
        const p = i / segments;
        const x = (p * w * 1.2) - (w * 0.1);
        
        // Mathematical Wave with Magnetic Mouse Tug
        const mouseTug = Math.exp(-Math.pow(x - mouse.x, 2) / 20000) * (mouse.y - centerY) * 0.8;
        const wave = Math.sin(time + i * 0.05) * (150 * (1 - stability)) + mouseTug;
        
        const y = centerY + wave * Math.sin(time * 0.5 + p * 2);
        
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  function loop() {
    drawRibbon();
    requestAnimationFrame(loop);
  }
  loop();

  // Experience Timeline
  const tl = gsap.timeline();
  tl.to('#aTag', { opacity: 0.4, y: 15, duration: 2, ease: 'expo.out' }, 0.5);
  tl.to('#sPanel', { opacity: 1, duration: 2, ease: 'power2.inOut' }, 1.2);
  tl.to('#sFill', { width: '100%', duration: 5, ease: 'none' }, 1.2);

  // STABILIZATION SEQUENCE
  tl.to({}, { 
    duration: 5, 
    onUpdate: function() { 
      stability = this.progress(); 
    },
    ease: 'power2.inOut'
  }, 1.2);

  // FINAL: Redirect
  tl.to('#flare', { opacity: 1, duration: 1.2, ease: 'expo.in' }, 6.2);
  tl.to('body', { opacity: 0, duration: 0.1 }, 7.2);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 7.4);
});
</script>
</body>
</html>
