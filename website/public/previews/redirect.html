<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Architectural Assembly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; }
    
    .blueprint-overlay { position:fixed; inset:0; z-index:1; opacity:0.08; pointer-events:none; }
    #assemblyCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .contextual-framing { position:fixed; inset:4vh 6vw; display:flex; flex-direction:column; justify-content:space-between; z-index:10; pointer-events:none; }
    .framing-header { display:flex; justify-content:space-between; font-family:var(--sans); text-transform:uppercase; letter-spacing:0.8em; font-size:0.55rem; color:var(--brass); opacity:0; }
    .framing-footer { display:flex; flex-direction:column; align-items:flex-start; gap:0.5rem; opacity:0; }
    .status-pill { padding:4px 12px; background:rgba(196,156,123,0.1); border:1px solid rgba(196,156,123,0.2); font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--brass); }
    .framing-msg { font-family:var(--serif); font-size:clamp(1.2rem, 2vw, 2rem); font-style:italic; color:var(--sand); }

    .magnetic-implosion { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas class="blueprint-overlay" id="bgCanvas"></canvas>
<canvas id="assemblyCanvas"></canvas>
<div class="magnetic-implosion" id="implode"></div>

<div class="contextual-framing">
  <div class="framing-header" id="fHeader">
    <span>Archive 8442 — Preview Term</span>
    <span>Prototype Env — 0.2.1-B</span>
  </div>
  
  <div class="framing-footer" id="fFooter">
    <div class="status-pill">Active Extraction</div>
    <h2 class="framing-msg">Handing over to primary digital salon...</h2>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('assemblyCanvas'), ctx = canvas.getContext('2d');
  const bgCanvas = document.getElementById('bgCanvas'), bgCtx = bgCanvas.getContext('2d');
  let w, h;
  function rs() { 
    w = canvas.width = bgCanvas.width = window.innerWidth; 
    h = canvas.height = bgCanvas.height = window.innerHeight; 
    drawBlueprint();
  }
  window.addEventListener('resize', rs); rs();

  // 1. Blueprint Background (Rotating 3D Wireframe)
  function drawBlueprint() {
    bgCtx.clearRect(0,0,w,h);
    bgCtx.strokeStyle = 'rgba(222,200,181,0.3)';
    bgCtx.lineWidth = 0.5;
    const step = 60;
    // Static coordinate grid (simulated)
    for(let x=0; x<w; x+=step) { bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
    for(let y=0; y<h; y+=step) { bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }
  }

  // 2. Mechanical Assemblage Engine (Numerals as line segments)
  let count = 5;
  let points = [];
  const numPoints = 600;

  function initPoints() {
    for(let i=0; i<numPoints; i++) {
      points.push({
        x: Math.random() * w, 
        y: Math.random() * h,
        tx: w/2, ty: h/2, // target x, y
        size: Math.random() * 2 + 1,
        alpha: Math.random() * 0.5 + 0.1
      });
    }
  }
  initPoints();

  // Define numeral patterns (simplified coordinates for 0-5)
  const patterns = {
    5: [[-1, -2], [1, -2], [-1, 0], [1, 0], [1, 2], [-1, 2]],
    4: [[-1, -2], [-1, 0], [1, 0], [1, -2], [1, 2]],
    3: [[-1, -2], [1, -2], [1, 0], [-1, 0], [1, 0], [1, 2], [-1, 2]],
    2: [[-1, -2], [1, -2], [1, 0], [-1, 0], [-1, 2], [1, 2]],
    1: [[0, -2], [0, 2]],
    0: [[-1, -2], [1, -2], [1, 2], [-1, 2], [-1, -2]]
  };

  function updateTargets() {
    const scale = 80;
    const pat = patterns[count];
    for(let i=0; i<numPoints; i++) {
      const p = points[i];
      const targetBase = pat[i % pat.length];
      p.tx = w/2 + targetBase[0] * scale + (Math.random() - 0.5) * 10;
      p.ty = h/2 + targetBase[1] * scale + (Math.random() - 0.5) * 10;
    }
  }
  updateTargets();

  function render() {
    ctx.clearRect(0,0,w,h);
    ctx.strokeStyle = '#DEC8B5';
    ctx.lineWidth = 1;

    for(let i=0; i<numPoints; i++) {
      const p = points[i];
      p.x += (p.tx - p.x) * 0.15;
      p.y += (p.ty - p.y) * 0.15;
      
      ctx.globalAlpha = p.alpha;
      ctx.strokeRect(p.x, p.y, p.size, p.size);
      
      // Draw lines between some points to create the "Wireframe Assemblage" feel
      if(i % 20 === 0 && i < numPoints - 20) {
        ctx.beginPath();
        ctx.globalAlpha = 0.05;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(points[i+20].x, points[i+20].y);
        ctx.stroke();
      }
    }
    requestAnimationFrame(render);
  }
  render();

  // 3. Experience Timeline
  const tl = gsap.timeline();
  tl.to(['#fHeader', '#fFooter'], { opacity: 1, duration: 1.5, stagger: 0.3, ease: 'power2.inOut' }, 0.5);

  // Countdown sync
  const timing = [5, 4, 3, 2, 1, 0];
  timing.forEach((val, i) => {
    tl.to({}, { 
      duration: 1, 
      onStart: () => { 
        count = val; 
        updateTargets(); 
        // Rapid jiggle on change
        gsap.to(points, { 
          alpha: 1, 
          duration: 0.1, 
          stagger: 0.0001, 
          onComplete: () => { gsap.to(points, { alpha: 0.5, duration: 0.4 }); } 
        });
      } 
    });
  });

  // Implosion Finale
  tl.to('#implode', { opacity: 1, duration: 1, ease: 'expo.in' }, 6.5);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 7.5);
});
</script>
</body>
</html>
