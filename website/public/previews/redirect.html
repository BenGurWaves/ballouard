<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Masterpiece Assemblage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; }
    
    #heroCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .archive-header { position:fixed; top:4vh; left:6vw; font-family:var(--sans); text-transform:uppercase; letter-spacing:0.8em; font-size:0.5rem; color:var(--brass); opacity:0.15; pointer-events:none; }
    
    .prototype-warning { position:fixed; top:8vh; left:50%; transform:translateX(-50%); font-family:var(--sans); text-transform:uppercase; letter-spacing:0.5em; font-size:0.6rem; color:var(--sand); opacity:0; z-index:15; display:flex; align-items:center; gap:12px; }
    .prototype-warning::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--brass); animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    
    #shimmer { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas id="heroCanvas"></canvas>
<div id="shimmer"></div>
<div class="archive-header">Archive 8442 — Handover Term</div>
<div class="prototype-warning" id="pWarning">Leaving Prototype Environment // Return to Source</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('heroCanvas'), ctx = canvas.getContext('2d');
  const buffer = document.createElement('canvas'), bCtx = buffer.getContext('2d');
  let w, h;
  
  function rs() { w = canvas.width = buffer.width = window.innerWidth; h = canvas.height = buffer.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();

  const lines = [];
  for(let i=0; i<40; i++) lines.push({ x: Math.random()*w, y: Math.random()*h, s: Math.random()*15 + 5, a: Math.random()*0.1 });

  let count = 5;
  let numSlices = 70;
  let slices = [];
  for(let i=0; i<numSlices; i++) slices.push({ offset: 0, amp: Math.random() * 2 });

  let shatterAmount = 0;

  function updateBuffer(text) {
    bCtx.clearRect(0,0,w,h);
    bCtx.font = `italic 400 ${Math.min(w, h) * 0.7}px "Instrument Serif"`;
    bCtx.textAlign = 'center'; bCtx.textBaseline = 'middle';
    bCtx.fillStyle = '#DEC8B5';
    bCtx.fillText(text, w/2, h/2);
  }
  updateBuffer('5');

  function render(time) {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#0D0C09';
    ctx.fillRect(0,0,w,h);
    
    // Backdrop
    ctx.strokeStyle = 'rgba(196, 156, 123, 0.05)';
    ctx.lineWidth = 1;
    lines.forEach(l => {
      l.x += l.s;
      if(l.x > w) l.x = -200;
      ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + 200, l.y);
      ctx.globalAlpha = l.a; ctx.stroke();
    });

    const sliceH = h / numSlices;
    for(let i=0; i<numSlices; i++) {
      const p = slices[i];
      const vibration = Math.sin(time * 0.01 + i) * p.amp;
      const xOffset = vibration + (p.offset * shatterAmount * w * 1.2);
      
      ctx.globalAlpha = 1 - (Math.abs(p.offset) * shatterAmount * 0.6);
      ctx.drawImage(buffer, 0, i * sliceH, w, sliceH, xOffset, i * sliceH, w, sliceH);
      
      if (shatterAmount > 0.1) {
        ctx.globalAlpha = 0.4 * shatterAmount;
        ctx.drawImage(buffer, 0, i * sliceH, w, sliceH, xOffset + shatterAmount * 30, i * sliceH, w, sliceH);
      }
    }

    requestAnimationFrame(render);
  }
  render(0);

  // BULLETPROOF ATOMIC TIMER
  function startHandoff() {
    gsap.to('#pWarning', { opacity: 0, duration: 0.5 });
    gsap.to('#shimmer', { 
      opacity: 1, 
      duration: 1.2, 
      ease: 'expo.in',
      onStart: () => {
        ctx.fillStyle = '#DEC8B5';
        ctx.fillRect(0,0,w,h);
      },
      onComplete: () => {
        window.location.href = 'https://velocity.calyvent.com';
      }
    });
  }

  function tick(currentNum) {
    if (currentNum < 0) {
      startHandoff();
      return;
    }

    // 1. Shatter
    slices.forEach(s => s.offset = (Math.random() - 0.5) * 2.5);
    
    gsap.to({v: 0}, { 
      v: 1, duration: 0.35, 
      onUpdate: function() { shatterAmount = this.targets()[0].v; },
      ease: 'power3.in',
      onComplete: () => {
        // 2. Swop number at peak
        updateBuffer(currentNum.toString());
        // 3. Assemble
        gsap.to({v: 1}, { 
          v: 0, duration: 0.6, 
          onUpdate: function() { shatterAmount = this.targets()[0].v; },
          ease: 'expo.out',
          onComplete: () => {
            // 4. Queue next tick
            gsap.delayedCall(0.5, () => tick(currentNum - 1));
          }
        });
      }
    });
  }

  // Initial Delay, then start the Atomic Chain
  gsap.to('#pWarning', { opacity: 0.8, duration: 1.5, delay: 0.2 });
  gsap.delayedCall(1.0, () => tick(5));
});
</script>
</body>
</html>
