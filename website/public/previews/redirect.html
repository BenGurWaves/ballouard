<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Spatial Cataclysm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#000; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .obsidian-grain { position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.06; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    
    #cataclysmCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .peace-layer { position:relative; z-index:20; pointer-events:none; display:flex; flex-direction:column; align-items:center; opacity:0; transform:translateY(20px); }
    .atelier-core { width:1px; height:60px; background:var(--brass); margin-bottom:2rem; box-shadow:0 0 20px rgba(196,156,123,0.5); animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 0.4; height: 50px; } 50% { opacity: 1; height: 70px; } }
    .peace-title { font-family:var(--serif); font-size:clamp(1.5rem, 3vw, 2.5rem); font-style:italic; font-weight:400; color:var(--sand); }
    
    .impact-flare { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="obsidian-grain"></div>
<div class="impact-flare" id="flare"></div>

<canvas id="cataclysmCanvas"></canvas>

<div class="peace-layer" id="peace">
  <div class="atelier-core"></div>
  <h2 class="peace-title">Digital Atelier Ready</h2>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('cataclysmCanvas'), ctx = canvas.getContext('2d');
  let w, h;
  function rs() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', rs); rs();

  // High-Fidelity 3D Artifacts
  const artifacts = [];
  const numArtifacts = 150;
  
  function createArtifact() {
    return {
      x: (Math.random() - 0.5) * 3500,
      y: (Math.random() - 0.5) * 3500,
      z: Math.random() * 4000,
      rotX: Math.random() * Math.PI * 2,
      rotY: Math.random() * Math.PI * 2,
      vRotX: (Math.random() - 0.5) * 0.1,
      vRotY: (Math.random() - 0.5) * 0.1,
      size: Math.random() * 80 + 30,
      color: Math.random() > 0.5 ? '#C49C7B' : '#DEC8B5',
      history: []
    };
  }

  for(let i=0; i<numArtifacts; i++) artifacts.push(createArtifact());

  let globalSpeed = 120; // Peak Velocity
  let timelineProgress = 0; // 0 to 1
  let cameraShake = 0;

  function render() {
    ctx.clearRect(0,0,w,h);
    
    const perspective = 600;
    const centerX = w / 2;
    const centerY = h / 2;
    
    // Noise-based camera shake
    const shakeX = (Math.random() - 0.5) * cameraShake;
    const shakeY = (Math.random() - 0.5) * cameraShake;

    for(let i=0; i<numArtifacts; i++) {
      const a = artifacts[i];
      a.z -= globalSpeed * (1 - timelineProgress);
      a.rotX += a.vRotX; a.rotY += a.vRotY;
      
      if(a.z <= 0) {
        Object.assign(a, createArtifact());
        a.z = 4000;
      }

      const f = perspective / a.z;
      const x = centerX + a.x * f + shakeX;
      const y = centerY + a.y * f + shakeY;

      if(x < -w || x > w*2 || y < -h || y > h*2) continue;

      const alpha = Math.min(1.0, (4000 - a.z) / 1500);
      
      // Draw Kinetic Warp Trail
      if (timelineProgress < 0.8) {
        ctx.beginPath();
        const trailF = perspective / (a.z + globalSpeed * 3);
        const trailX = centerX + a.x * trailF;
        const trailY = centerY + a.y * trailF;
        
        ctx.strokeStyle = `rgba(196,156,123,${alpha * 0.15})`;
        ctx.lineWidth = 1;
        ctx.moveTo(x, y); ctx.lineTo(trailX, trailY);
        ctx.stroke();
      }

      // Draw Volumetric Glass Fragment
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a.rotX);
      ctx.globalAlpha = alpha * 0.7;
      
      // Face Reflection
      const grad = ctx.createLinearGradient(-a.size/2, -a.size/2, a.size/2, a.size/2);
      grad.addColorStop(0, a.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      
      // Chromatic Aberration Simulation
      const dist = Math.sqrt(Math.pow(x-w/2,2) + Math.pow(y-h/2,2));
      const shift = (dist / w) * 10 * (1 - timelineProgress);
      
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = 'rgba(255,100,100,0.1)';
      ctx.fillRect(-a.size/2*f - shift, -a.size/2*f, a.size*f, a.size*f);
      ctx.fillStyle = 'rgba(100,255,255,0.1)';
      ctx.fillRect(-a.size/2*f + shift, -a.size/2*f, a.size*f, a.size*f);
      
      ctx.fillStyle = grad;
      ctx.fillRect(-a.size/2*f, -a.size/2*f, a.size*f, a.size*f);
      ctx.restore();
    }

    requestAnimationFrame(render);
  }
  render();

  // THE MASTERPIECE TIMELINE
  const tl = gsap.timeline();
  
  // 1. Peak Speed + Turbulence (0-2.8s)
  tl.to({}, { duration: 2.8, onUpdate: function() { cameraShake = 15 * (1 - timelineProgress); } });
  
  // 2. THE SPATIAL CRUSH (2.8s - 3.2s)
  tl.to({v:0}, { 
    v:1, 
    duration: 0.5, 
    onUpdate: function() { timelineProgress = this.targets()[0].v; },
    ease: 'expo.out'
  }, 2.8);
  
  tl.to('#flare', { opacity: 1, duration: 0.1, repeat: 1, yoyo: true }, 3.1);
  tl.to({}, { duration: 0.2, onStart: () => { cameraShake = 60; }, onComplete: () => { cameraShake = 0; } }, 3.1);

  // 3. THE PEACE VOID (3.2s - 5.5s)
  tl.to(canvas, { opacity: 0, duration: 1.2 }, 3.2);
  tl.to('#peace', { opacity: 1, y: 0, duration: 2, ease: 'expo.out' }, 3.5);

  // 4. FINAL ATELIER REDIRECT
  tl.to('body', { opacity: 0, scale: 1.05, duration: 1.2, delay: 1.5, ease: 'power2.inOut', onComplete: () => {
    window.location.href = 'https://velocity.calyvent.com';
  }});
});
</script>
</body>
</html>
