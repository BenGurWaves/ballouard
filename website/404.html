<style>
:root{--bg:#0D0C09;--sand:#DEC8B5;--brass:#C49C7B;--dim:#565250;--border:rgba(222,200,181,.07)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--sand);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;text-align:center}
a{color:inherit;text-decoration:none}
.grain{position:fixed;inset:-50%;width:200%;height:200%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.87' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.04;pointer-events:none;z-index:9000;animation:gr .5s steps(2) infinite}
@keyframes gr{0%{transform:translate(0,0)}25%{transform:translate(-2%,-2%)}50%{transform:translate(2%,1%)}75%{transform:translate(-1%,3%)}}
.wrap{max-width:480px}
.num{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(5rem,18vw,12rem);font-weight:400;letter-spacing:-.06em;line-height:.9;color:rgba(222,200,181,.07);margin-bottom:-1rem;user-select:none}
.title{font-family:'Instrument Serif',Georgia,serif;font-weight:400;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:-.04em;color:var(--sand);margin-bottom:.75rem;line-height:1.1}
.sub{font-size:.8rem;color:var(--dim);line-height:1.85;margin-bottom:2.5rem;max-width:34ch;margin-left:auto;margin-right:auto}
.home{font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--sand);border-bottom:1px solid rgba(222,200,181,.13);padding-bottom:2px;transition:border-color .3s}
.home:hover{border-color:var(--brass);color:var(--brass)}
.brand{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);font-family:'Instrument Serif',Georgia,serif;font-size:1rem;letter-spacing:-.02em;color:var(--sand)}
.brand em{font-style:normal;color:var(--brass)}
</style>
</head>
<body>
<div class="grain"></div>
