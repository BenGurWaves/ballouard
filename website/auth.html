<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity — Sign In</title>
  <meta name="description" content="Sign in or create your Velocity account to manage your website redesign.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>V</text></svg>">
</head>
<body>

  <!-- ── Nav ── -->
  <nav class="nav nav--scrolled" id="nav">
    <div class="nav-inner">
      <a href="/" class="logo">Velocity<span class="logo-dot">.</span></a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/#pricing">Pricing</a>
        <a href="/#faq">FAQ</a>
        <a href="#" class="nav-cta" id="navCtaLink">Get a free redesign</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span>
      </button>
    </div>
  </nav>

  <section class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <a href="/" class="logo">Velocity<span class="logo-dot">.</span></a>
          <p class="auth-subtitle">Manage your website redesign</p>
        </div>

        <!-- Tab toggle -->
        <div class="auth-tabs">
          <button class="auth-tab auth-tab--active" id="tabSignIn" type="button">Sign in</button>
          <button class="auth-tab" id="tabSignUp" type="button">Create account</button>
        </div>

        <!-- ── SIGN IN FORM ── -->
        <form class="auth-form" id="signInForm">
          <div class="input-wrap">
            <label for="siEmail">Email</label>
            <input type="email" id="siEmail" name="email" placeholder="you@yourbusiness.com" required autocomplete="email">
          </div>
          <div class="input-wrap">
            <label for="siPassword">Password</label>
            <input type="password" id="siPassword" name="password" placeholder="Your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="siBtn">Sign in</button>
          <div class="auth-error" id="siError" style="display:none;"></div>
          <p class="auth-fine">Don't have an account? <a href="#" id="switchToSignUp">Create one</a></p>
        </form>

        <!-- ── SIGN UP FORM ── -->
        <form class="auth-form" id="signUpForm" style="display:none;">
          <div class="input-wrap">
            <label for="suEmail">Email</label>
            <input type="email" id="suEmail" name="email" placeholder="you@yourbusiness.com" required autocomplete="email">
          </div>
          <div class="input-wrap">
            <label for="suPassword">Password</label>
            <input type="password" id="suPassword" name="password" placeholder="Create a password" required autocomplete="new-password" minlength="8">
          </div>
          <div class="input-wrap">
            <label for="suPasswordConfirm">Confirm password</label>
            <input type="password" id="suPasswordConfirm" name="password_confirm" placeholder="Type it again" required autocomplete="new-password" minlength="8">
          </div>
          <div class="input-wrap">
            <label for="suWebsite">Your website URL</label>
            <input type="url" id="suWebsite" name="website_url" placeholder="https://yourbusiness.com" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="suBtn">Create account</button>
          <div class="auth-error" id="suError" style="display:none;"></div>
          <p class="auth-fine">Already have an account? <a href="#" id="switchToSignIn">Sign in</a></p>
        </form>
      </div>
  </section>

  <script>
  (function () {
    'use strict';

    // ── Mobile nav toggle ──
    var toggle = document.getElementById('navToggle');
    var links = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', function() {
        links.classList.toggle('is-open');
        toggle.classList.toggle('is-open');
      });
      links.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('click', function() {
          links.classList.remove('is-open');
          toggle.classList.remove('is-open');
        });
      });
    }

    // CTA link goes to homepage start section
    var ctaLink = document.getElementById('navCtaLink');
    if (ctaLink) ctaLink.href = '/#start';

    var tabSI = document.getElementById('tabSignIn');
    var tabSU = document.getElementById('tabSignUp');
    var formSI = document.getElementById('signInForm');
    var formSU = document.getElementById('signUpForm');
    var switchToSignUp = document.getElementById('switchToSignUp');
    var switchToSignIn = document.getElementById('switchToSignIn');

    function showSignIn() {
      tabSI.classList.add('auth-tab--active');
      tabSU.classList.remove('auth-tab--active');
      formSI.style.display = 'block';
      formSU.style.display = 'none';
    }
    function showSignUp() {
      tabSU.classList.add('auth-tab--active');
      tabSI.classList.remove('auth-tab--active');
      formSU.style.display = 'block';
      formSI.style.display = 'none';
    }

    tabSI.addEventListener('click', showSignIn);
    tabSU.addEventListener('click', showSignUp);
    switchToSignUp.addEventListener('click', function(e) { e.preventDefault(); showSignUp(); });
    switchToSignIn.addEventListener('click', function(e) { e.preventDefault(); showSignIn(); });

    // Pre-fill from URL params (coming from main form)
    var params = new URLSearchParams(window.location.search);
    if (params.get('email')) {
      document.getElementById('suEmail').value = params.get('email');
    }
    if (params.get('website')) {
      document.getElementById('suWebsite').value = params.get('website');
    }
    // If we have pre-fill params, default to sign-up tab
    if (params.get('email') || params.get('website')) {
      showSignUp();
    }

    // Sign Up handler — awaits API response so session cookie is set
    formSU.addEventListener('submit', function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('suError');
      errorEl.style.display = 'none';

      var email = document.getElementById('suEmail').value.trim();
      var pass = document.getElementById('suPassword').value;
      var passConfirm = document.getElementById('suPasswordConfirm').value;
      var website = document.getElementById('suWebsite').value.trim();

      if (pass !== passConfirm) {
        errorEl.textContent = 'Passwords do not match. Try again.';
        errorEl.style.display = 'block';
        return;
      }
      if (pass.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.style.display = 'block';
        return;
      }

      var btn = document.getElementById('suBtn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      // Call backend API — wait for response so session cookie is set
      fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email: email, password: pass, website_url: website }),
      })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (!res.ok && res.data.error) {
          // If storage not configured, fall back to local-only mode
          if (res.data.error.toLowerCase().indexOf('storage') !== -1) {
            return fallbackSignup();
          }
          // If user already exists, show friendly message
          if (res.data.error.toLowerCase().indexOf('exists') !== -1) {
            errorEl.textContent = 'An account with this email already exists. Try signing in instead.';
          } else {
            errorEl.textContent = res.data.error;
          }
          errorEl.style.display = 'block';
          btn.textContent = 'Create account';
          btn.disabled = false;
          return;
        }
        finishSignup(res.data.project_id || null);
      })
      .catch(function() { fallbackSignup(); });

      function finishSignup(projectId) {
        var user = {
          email: email,
          website_url: website,
          created_at: new Date().toISOString(),
          plan: null,
          status: 'preview_pending',
          progress: 0,
          project_id: projectId,
        };
        localStorage.setItem('velocity_user', JSON.stringify(user));
        localStorage.setItem('velocity_auth', 'true');
        if (website) {
          fetch('/api/request-redesign', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ website_url: website, email: email }),
          }).catch(function() {});
        }
        window.location.href = '/dashboard.html';
      }

      function fallbackSignup() {
        finishSignup(null);
      }
    });

    // Sign In handler — awaits API response so session cookie is set
    formSI.addEventListener('submit', function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('siError');
      errorEl.style.display = 'none';
      var btn = document.getElementById('siBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      var email = document.getElementById('siEmail').value.trim();
      var password = document.getElementById('siPassword').value;

      // Call login API — wait for session cookie
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email: email, password: password }),
      })
      .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
      .then(function(res) {
        if (!res.ok) {
          // If storage issue, fall back to local-only mode
          if (res.data.error && res.data.error.toLowerCase().indexOf('storage') !== -1) {
            return fallbackSignin();
          }
          errorEl.textContent = res.data.error || 'Invalid email or password.';
          errorEl.style.display = 'block';
          btn.textContent = 'Sign in';
          btn.disabled = false;
          return;
        }

        finishSignin(res.data);
      })
      .catch(function() { fallbackSignin(); });

      function finishSignin(apiData) {
        var user = {
          email: (apiData && apiData.email) || email,
          plan: (apiData && apiData.plan) || null,
          created_at: new Date().toISOString(),
          status: 'active',
        };

        // Try to load saved lead/questionnaire data
        fetch('/api/lead-data?email=' + encodeURIComponent(email))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.data) {
              var d = data.data;
              if (d.website_url) user.website_url = d.website_url;
              if (d.business_name) user.business_name = d.business_name;
              if (d.niche) user.niche = d.niche;
              if (d.services) user.services = d.services;
              if (d.location) user.location = d.location;
              if (d.style) user.style = d.style;
              if (d.site_type) user.site_type = d.site_type;
              if (d.phone) user.phone = d.phone;
              if (d.preview_id) user.preview_id = d.preview_id;
              if (d.preview_url) user.preview_url = d.preview_url;
              if (d.questionnaire_filled) user.questionnaire_filled = true;
              if (d.preview_id) user.preview_ready = true;
            }
          })
          .catch(function() {})
          .finally(function() {
            // Also restore any existing localStorage data
            var existing = JSON.parse(localStorage.getItem('velocity_user') || '{}');
            if (existing.email === email) {
              // Merge: new API data wins, but keep local questionnaire answers
              Object.keys(existing).forEach(function(k) {
                if (!(k in user) || user[k] === null || user[k] === undefined) {
                  user[k] = existing[k];
                }
              });
            }
            localStorage.setItem('velocity_user', JSON.stringify(user));
            localStorage.setItem('velocity_auth', 'true');
            window.location.href = '/dashboard.html';
          });
      }

      function fallbackSignin() {
        // Check if we have existing localStorage data for this email
        var existing = JSON.parse(localStorage.getItem('velocity_user') || '{}');
        if (existing.email === email) {
          // Restore existing session
          localStorage.setItem('velocity_auth', 'true');
          window.location.href = '/dashboard.html';
        } else {
          // No previous data — create minimal session
          var user = { email: email, created_at: new Date().toISOString(), status: 'active' };
          localStorage.setItem('velocity_user', JSON.stringify(user));
          localStorage.setItem('velocity_auth', 'true');
          window.location.href = '/dashboard.html';
        }
      }
    });
  })();
  </script>
</body>
</html>
