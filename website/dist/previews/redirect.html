<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Pure Numeral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; }
    
    #heroCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .archive-header { position:fixed; top:4vh; left:6vw; font-family:var(--sans); text-transform:uppercase; letter-spacing:0.8em; font-size:0.55rem; color:var(--brass); opacity:0.3; pointer-events:none; }
    
    #shimmer { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas id="heroCanvas"></canvas>
<div id="shimmer"></div>
<div class="archive-header">Archive 8442 — Primary Handoff Term</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const canvas = document.getElementById('heroCanvas'), ctx = canvas.getContext('2d');
  const hCanvas = document.createElement('canvas'), hCtx = hCanvas.getContext('2d', { willReadFrequently: true });
  let w, h;
  
  function rs() { 
    w = canvas.width = hCanvas.width = window.innerWidth; 
    h = canvas.height = hCanvas.height = window.innerHeight; 
  }
  window.addEventListener('resize', rs); rs();

  // 1. Starfield Engine
  const stars = [];
  for(let i=0; i<600; i++) {
    stars.push({
      x: Math.random() * w, y: Math.random() * h, z: Math.random() * w, 
      r: Math.random() * 1.5,
      alpha: Math.random() * 0.5 + 0.1
    });
  }

  let count = 5;
  let textScale = 1;
  let textAlpha = 0;
  let textBlur = 20;

  function render() {
    ctx.clearRect(0,0,w,h);
    
    // Draw the "Behind the Scenes" Starfield
    ctx.fillStyle = 'rgba(222,200,181,0.2)';
    stars.forEach(s => {
      s.z -= 18;
      if(s.z <= 0) s.z = w;
      const f = 450 / s.z;
      const x = (s.x - w/2) * f + w/2;
      const y = (s.y - h/2) * f + h/2;
      
      // Basic Star
      ctx.globalAlpha = s.alpha;
      ctx.fillRect(x, y, s.r, s.r);
    });

    // Capture the Background for Refractive Pass
    // We sample a high-contrast 'Negative Mask' for the numeral
    hCtx.clearRect(0,0,w,h);
    hCtx.font = `italic 400 ${Math.min(w, h) * 0.8 * textScale}px "Instrument Serif"`;
    hCtx.textAlign = 'center'; hCtx.textBaseline = 'middle';
    hCtx.fillStyle = 'white';
    hCtx.fillText(count, w/2, h/2);

    // DRAW THE HERO NUMERAL (The "Main Attraction")
    ctx.save();
    ctx.globalAlpha = textAlpha;
    // We use a slight 'inner glow' by layering the text
    ctx.shadowBlur = 40 * (1 - textAlpha);
    ctx.shadowColor = 'rgba(196,156,123,0.5)';
    ctx.filter = `blur(${textBlur}px)`;
    
    ctx.font = `italic 400 ${Math.min(w, h) * 0.8 * textScale}px "Instrument Serif"`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#DEC8B5';
    ctx.fillText(count, w/2, h/2);
    ctx.restore();

    // REFRACTIVE INTERSECTION (Stars that pass "Behind" the numbers)
    // We sample the imageData of the numeral to flare stars
    const idata = hCtx.getImageData(0,0,w,h).data;
    ctx.fillStyle = '#FFF';
    stars.forEach(s => {
      const f = 450 / s.z;
      const x = Math.floor((s.x - w/2) * f + w/2);
      const y = Math.floor((s.y - h/2) * f + h/2);
      
      if (x > 0 && x < w && y > 0 && y < h) {
        if (idata[(y * w + x) * 4] > 128) {
          // Flare effect
          ctx.globalAlpha = textAlpha * 0.6;
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    });

    requestAnimationFrame(render);
  }
  render();

  // THE MASTERPIECE TIMELINE
  const tl = gsap.timeline();
  
  // Initial Fade in
  tl.to({a:0, b:20, s:1.1}, {
    a: 1, b: 0, s: 1,
    duration: 2.2,
    onUpdate: function() {
      textAlpha = this.targets()[0].a;
      textBlur = this.targets()[0].b;
      textScale = this.targets()[0].s;
    },
    ease: 'expo.out'
  });

  // THE IMPACT COUNTDOWN (5-4-3-2-1)
  const nums = [4, 3, 2, 1, 0];
  nums.forEach(num => {
    tl.to({}, { 
      duration: 1.2, 
      onStart: () => {
        // Dramatic Impact Shift
        gsap.to({s: 1.05, a: 0.5, b: 10}, {
          s: 1, a: 1, b: 0,
          duration: 0.8,
          onUpdate: function() {
            textScale = this.targets()[0].s;
            textAlpha = this.targets()[0].a;
            textBlur = this.targets()[0].b;
          },
          ease: 'expo.out',
          onStart: () => { count = num; }
        });
      }
    });
  });

  // FINAL SHIMMER & HANDOFF
  tl.to('#shimmer', { opacity: 1, duration: 1.2, ease: 'expo.in' }, '+=0.6');
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, '+=0.1');
});
</script>
</body>
</html>
