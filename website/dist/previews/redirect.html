<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Atelier Transition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; display:flex; align-items:center; justify-content:center; }
    
    .velvet-grain { position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.04; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
    
    .atelier-canvas { position:absolute; inset:0; z-index:1; opacity:0.7; pointer-events:none; }
    
    .transition-container { position:relative; z-index:10; text-align:center; max-width:800px; padding:0 5vw; }
    .atelier-tag { font-family:var(--sans); text-transform:uppercase; letter-spacing:0.8em; font-size:0.5rem; color:var(--brass); margin-bottom:4rem; display:block; opacity:0; filter:blur(10px); }
    
    .salon-title { font-family:var(--serif); font-size:clamp(3.5rem, 10vw, 8rem); line-height:0.9; margin-bottom:3rem; font-weight:400; opacity:0; filter:blur(20px); }
    .salon-title em { font-style:italic; color:var(--brass); }
    
    .salon-desc { font-size:1.1rem; line-height:1.9; color:var(--dim); font-weight:300; opacity:0; max-width:45ch; margin-inline:auto; letter-spacing:0.02em; filter:blur(5px); }

    .countdown-ring-wrap { position:relative; width:40px; height:40px; margin:6rem auto 0; opacity:0; }
    .countdown-ring-svg { width:40px; height:40px; transform: rotate(-90deg); }
    .countdown-ring-path { fill:none; stroke:var(--brass); stroke-width:1; stroke-dasharray:113; stroke-dashoffset:113; opacity:0.4; }

    .exit-shimmer { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<div class="velvet-grain"></div>
<div class="exit-shimmer" id="shimmer"></div>
<canvas class="atelier-canvas" id="atelierCanvas"></canvas>

<div class="transition-container">
  <span class="atelier-tag" id="aTag">Velocity Bespoke Preview</span>
  <h1 class="salon-title" id="sTitle">Returning to the<br><em>Primary Salon.</em></h1>
  <p class="salon-desc" id="sDesc">Your bespoke preview session is now complete. We are elegantly returning you to the Velocity source atelier to explore the live digital archive.</p>
  
  <div class="countdown-ring-wrap" id="rWrap">
    <svg class="countdown-ring-svg" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="18" stroke="rgba(196,156,123,0.1)" stroke-width="1" fill="none" />
      <circle class="countdown-ring-path" id="rPath" cx="20" cy="20" r="18" />
    </svg>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const tl = gsap.timeline();
  
  // Cinematic Focus Reveal
  tl.to('#aTag', { opacity: 1, filter: 'blur(0px)', duration: 2, ease: 'expo.out' }, 0.5);
  tl.to('#sTitle', { opacity: 1, filter: 'blur(0px)', duration: 2.5, ease: 'expo.out' }, 0.8);
  tl.to('#sDesc', { opacity: 1, filter: 'blur(0px)', duration: 2.5, ease: 'power2.out' }, 1.2);
  tl.to('#rWrap', { opacity: 1, duration: 2 }, 1.8);
  
  // Elegant Countdown
  tl.to('#rPath', { strokeDashoffset: 0, duration: 5, ease: 'none' }, 1.8);
  
  // Soft Shimmer Exit & Redirect
  tl.to('#shimmer', { opacity: 1, duration: 1.5, delay: 4.5, ease: 'power2.inOut' });
  tl.to('body', { opacity: 0, duration: 0.1 }, 6.0);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 6.2);

  // Ethereal Light Prism (Canvas)
  const cv = document.getElementById('atelierCanvas'), ctx = cv.getContext('2d');
  let w, h, points = [];
  function rs() { w = cv.width = window.innerWidth; h = cv.height = window.innerHeight; init(); }
  function init() {
    points = [];
    for(let i=0; i<3; i++) {
      points.push({
        x: Math.random() * w, 
        y: Math.random() * h, 
        r: Math.random() * w * 0.5 + w * 0.2, 
        vx: (Math.random()-0.5) * 0.6, 
        vy: (Math.random()-0.5) * 0.6,
        color: i === 0 ? 'rgba(196,156,123,0.08)' : (i === 1 ? 'rgba(222,200,181,0.05)' : 'rgba(86,82,80,0.05)')
      });
    }
  }
  window.addEventListener('resize', rs); rs();

  function draw() {
    ctx.clearRect(0,0,w,h);
    points.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x < 0 || p.x > w) p.vx *= -1;
      if(p.y < 0 || p.y > h) p.vy *= -1;
      
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      grad.addColorStop(0, p.color);
      grad.addColorStop(1, 'transparent');
      
      ctx.fillStyle = grad;
      ctx.globalCompositeOperation = 'screen';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.28);
      ctx.fill();
    });
    requestAnimationFrame(draw);
  } draw();
});
</script>
</body>
</html>
