<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity — The Geometric Sigil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=31">
  <style>
    body, html { margin:0; padding:0; background:#0D0C09; overflow:hidden; color:var(--sand); font-family:var(--sans); -webkit-font-smoothing:antialiased; height:100vh; }
    
    #bgCanvas { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0.3; }
    #sigilCanvas { position:absolute; inset:0; z-index:5; width:100%; height:100%; }
    
    .archive-metadata { position:fixed; inset:6vh 8vw; display:flex; flex-direction:column; justify-content:space-between; z-index:10; pointer-events:none; }
    .metadata-line { display:flex; justify-content:space-between; font-family:var(--sans); text-transform:uppercase; letter-spacing:1.2em; font-size:0.45rem; color:var(--brass); opacity:0.4; }
    
    .status-sidebar { position:fixed; top:50%; right:4vw; transform:translateY(-50%) rotate(90deg); font-family:var(--sans); font-size:0.5rem; letter-spacing:0.5em; text-transform:uppercase; color:var(--brass); opacity:0; white-space:nowrap; }

    .shimmer-handoff { position:fixed; inset:0; z-index:1000; background:var(--sand); opacity:0; pointer-events:none; }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="sigilCanvas"></canvas>
<div class="shimmer-handoff" id="shimmer"></div>

<div class="archive-metadata">
  <div class="metadata-line" id="mTop">
    <span>Archive 8442</span>
    <span>Prototype Ref: B-02</span>
  </div>
  <div class="metadata-line" id="mBottom">
    <span>Extraction Phase 09</span>
    <span>Returning to Source</span>
  </div>
</div>

<div class="status-sidebar" id="sSide">Handover Initiated</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>
window.addEventListener('load', () => {
  const sCanvas = document.getElementById('sigilCanvas'), sCtx = sCanvas.getContext('2d');
  const bCanvas = document.getElementById('bgCanvas'), bCtx = bCanvas.getContext('2d');
  let w, h;
  function rs() { 
    w = sCanvas.width = bCanvas.width = window.innerWidth; 
    h = sCanvas.height = bCanvas.height = window.innerHeight; 
  }
  window.addEventListener('resize', rs); rs();

  // 1. Gravitational Starfield
  const stars = [];
  for(let i=0; i<800; i++) stars.push({x: Math.random()*w, y: Math.random()*h, ox:0, oy:0, s: Math.random()*1.5});
  function drawStars(warpX, warpY) {
    bCtx.clearRect(0,0,w,h);
    bCtx.fillStyle = 'rgba(222,200,181,0.4)';
    stars.forEach(s => {
      const dx = s.x - warpX, dy = s.y - warpY;
      const d = Math.sqrt(dx*dx + dy*dy);
      const shift = 1000 / (d + 100);
      bCtx.fillRect(s.x + dx/d * shift, s.y + dy/d * shift, s.s, s.s);
    });
  }

  // 2. 5,000-Point Volumetric Sigil
  const points = [];
  const numPoints = 5000;
  for(let i=0; i<numPoints; i++) {
    points.push({
      x: (Math.random()-0.5)*2, y: (Math.random()-0.5)*4, z: (Math.random()-0.5)*0.8,
      size: Math.random()*1.5 + 0.5, alpha: Math.random()*0.8 + 0.2
    });
  }

  let rotationY = 0, rotationX = 0;
  let count = 5;

  // Numeral Negative Space Maps
  const numerals = {
    5: (x,y) => (y < -0.8 && x < 0.5) || (y > -0.2 && y < 0.2) || (y > 0.8 && x > -0.5) || (x < -0.4 && y < 0) || (x > 0.4 && y > 0),
    4: (x,y) => (x < -0.4 && y < 0) || (x > 0.4) || (y > -0.1 && y < 0.1),
    3: (x,y) => (y < -0.8) || (y > -0.1 && y < 0.1) || (y > 0.8) || (x > 0.4),
    2: (x,y) => (y < -0.8) || (y > -0.1 && y < 0.1) || (y > 0.8) || (x > 0.4 && y < 0) || (x < -0.4 && y > 0),
    1: (x,y) => (x > -0.05 && x < 0.05),
    0: (x,y) => Math.abs(x) > 0.4 || Math.abs(y) > 0.8
  };

  function render() {
    sCtx.clearRect(0,0,w,h);
    rotationY += 0.006; rotationX += 0.002;
    
    const perspective = 800;
    const centerX = w/2, centerY = h/2;
    const sY = Math.sin(rotationY), cY = Math.cos(rotationY);
    const sX = Math.sin(rotationX), cX = Math.cos(rotationX);

    for(let i=0; i<numPoints; i++) {
      const p = points[i];
      let x = p.x * cY - p.z * sY;
      let z = p.x * sY + p.z * cY;
      let y = p.y * cX - z * sX;
      let zFinal = p.y * sX + z * cX;

      const f = perspective / (zFinal + 4);
      const sx = centerX + x * f * 100;
      const sy = centerY + y * f * 100;

      // Negative Space Check
      const isNegative = numerals[count](x, y);
      
      sCtx.globalAlpha = isNegative ? p.alpha * 1.5 : p.alpha * 0.1;
      sCtx.fillStyle = isNegative ? '#DEC8B5' : '#C49C7B';
      const size = isNegative ? p.size * 1.5 : p.size * 0.5;
      sCtx.fillRect(sx, sy, size, size);
    }
    
    drawStars(centerX, centerY);
    requestAnimationFrame(render);
  }
  render();

  // 3. Experience Timeline
  const tl = gsap.timeline();
  tl.to(['#mTop', '#mBottom', '#sSide'], { opacity: 1, duration: 2, stagger: 0.3, ease: 'power2.inOut' }, 0.5);

  const countdown = [5, 4, 3, 2, 1, 0];
  countdown.forEach((val, i) => {
    tl.to({}, { duration: 1, onStart: () => { count = val; } });
  });

  tl.to('#shimmer', { opacity: 1, duration: 1.2, ease: 'expo.in' }, 6.5);
  tl.add(() => {
    window.location.href = 'https://velocity.calyvent.com';
  }, 7.7);
});
</script>
</body>
</html>
